name: Get OIDC Token
on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token
        run: |
          # Pede o JWT OIDC para o endpoint interno do GitHub Actions
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=cloudsmith" | jq -r .value)
          echo "JWT: $TOKEN"
          # Decodificar para ver as claims
          echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool
      - name: Fetch OIDC JWT
        run: |
          JWT=$(curl -sLS \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=cloudsmith" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            | jq -r .value)
          echo "TOKEN_COMPLETO=$JWT"